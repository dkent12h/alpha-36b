<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/vite.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Alpha36b Market</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.backgroundColor = '#450a0a';
        div.style.color = '#f87171';
        div.style.padding = '20px';
        div.style.zIndex = '9999';
        div.style.fontFamily = 'monospace';
        div.innerHTML = '<h2>🚨 Debug Alert:</h2>' +
                        '<p><b>Error:</b> ' + msg + '</p>' +
                        '<p><b>File:</b> ' + (url ? url.split("/").pop() : "unknown") + '</p>' +
                        '<p><b>Line:</b> ' + lineNo + '</p>';
        document.body.appendChild(div);
        return false;
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Force unregister existing Service Workers to clear persistent cache
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister();
            console.log('Unregistered SW to clear cache');
          }
        });
      }
    </script>
